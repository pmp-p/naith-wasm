name: pygbag_build
on: [workflow_dispatch]


jobs:
  build-pygbag:
    name: Build for Emscripten
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v2
    - name: Checkout
      run: |
            python3 -m pip install --user pygbag
            python3 -m pygbag --PYBUILD 3.12 --no_opt --ume_block 0 --build $GITHUB_WORKSPACE/game/main.py

    - name : "Upload to GitHub pages"
      uses: JamesIves/github-pages-deploy-action@4.1.7
      with:
        branch: gh-pages
        folder: game/build/web
